const RANKING_METHODS = [
  "Wins → Ends","Wins → Margins","Wins → Ends → Margins",
  "Wins → Margins → Ends","Wins → Margins → Percentage",
  "Wins → Margins → Ends → Percentage","Wins → Margins → Least Shots Against",

const BYE_MODES = ["Byes at Bottom","Byes Spread Evenly"];

//  VERSATILITY LOGIC
// ══════════════════════════════════════════════════════════════════════════

// Build a round-robin schedule for one section
function sectionRoundRobin(teams) {
  const list = [...teams];
  if (list.length % 2 !== 0) list.push("BYE");
  const total = list.length, half = total / 2, numRounds = total - 1;
  const rounds = [];
  for (let r = 0; r < numRounds; r++) {
    const pairings = [];
    for (let i = 0; i < half; i++) {
      const home = list[i], away = list[total - 1 - i];
      if (home !== "BYE" && away !== "BYE") pairings.push({ home, away });
    }
    rounds.push(pairings);
    list.splice(1, 0, list.pop());
  }
  return rounds;
}

// Generate versatility rounds from config
// roundConfig = array of { gamesPerPair: number } one entry per round
// sections = array of team-name arrays (usually 1 or 2)
function buildVersatilityDraw(sections, roundConfig) {
  // Each section gets its own RR schedule
  const sectionSchedules = sections.map(s => sectionRoundRobin(s));
  const maxRounds = Math.max(...sectionSchedules.map(s => s.length));
  
  const draw = [];
  for (let ri = 0; ri < roundConfig.length; ri++) {
    const cfg = roundConfig[ri];
    const roundMatches = [];
    let rinkCounter = 1;

    sections.forEach((sTeams, si) => {
      const rrRound = sectionSchedules[si][ri % sectionSchedules[si].length] || [];
      rrRound.forEach(pair => {
        for (let g = 0; g < cfg.gamesPerPair; g++) {
          roundMatches.push({
            id: `r${ri}-s${si}-${pair.home}-${pair.away}-g${g}`,
            section: sections.length > 1 ? `Section ${String.fromCharCode(65 + si)}` : "",
            home: pair.home,
            away: pair.away,
            game: GAME_LABELS[g],          // "A", "B", etc
            rink: rinkCounter++,
            homeScore: "",
            awayScore: "",
          });
        }
      });
    });
    draw.push(roundMatches);
  }
  return draw;
}

// Calc versatility ladder — each individual game (A or B) is a separate win/loss
function calcVersatilityLadder(teams, rounds, rankMethod) {
  const s = {};
  teams.forEach(t => { s[t] = { team:t, played:0, wins:0, losses:0, draws:0, shotsFor:0, shotsAgainst:0, margin:0, gameWins:0, gameLosses:0 }; });
  rounds.forEach(round => round.forEach(m => {
    const hs = parseInt(m.homeScore), as = parseInt(m.awayScore);
    if (isNaN(hs) || isNaN(as) || !s[m.home] || !s[m.away]) return;
    s[m.home].played++; s[m.away].played++;
    s[m.home].shotsFor += hs; s[m.home].shotsAgainst += as;
    s[m.away].shotsFor += as; s[m.away].shotsAgainst += hs;
    s[m.home].margin += (hs - as); s[m.away].margin += (as - hs);
    if (hs > as) { s[m.home].gameWins++; s[m.away].gameLosses++; }
    else if (as > hs) { s[m.away].gameWins++; s[m.home].gameLosses++; }
  }));

  // Count match wins: a "match" = both A and B games vs same opponent in same round
  // group by round → home/away pair → sum scores across games
  const matchStats = {};
  teams.forEach(t => { matchStats[t] = { wins:0, losses:0, draws:0 }; });
  rounds.forEach(round => {
    const groups = {};
    round.forEach(m => {
      const key = [m.home, m.away].sort().join("|||") + "|||" + (m.section || "");
      if (!groups[key]) groups[key] = { home:m.home, away:m.away, homeTotal:0, awayTotal:0, count:0, valid:0 };
      const hs = parseInt(m.homeScore), as = parseInt(m.awayScore);
      if (!isNaN(hs) && !isNaN(as)) { groups[key].homeTotal += hs; groups[key].awayTotal += as; groups[key].valid++; }
      groups[key].count++;
    });
    Object.values(groups).forEach(g => {
      if (g.valid < g.count) return; // not all games scored yet
      if (!matchStats[g.home] || !matchStats[g.away]) return;
      if (g.homeTotal > g.awayTotal) { matchStats[g.home].wins++; matchStats[g.away].losses++; }
      else if (g.awayTotal > g.homeTotal) { matchStats[g.away].wins++; matchStats[g.home].losses++; }
      else { matchStats[g.home].draws++; matchStats[g.away].draws++; }
    });
  });

  return Object.values(s).map(r => ({
    ...r,
    wins: matchStats[r.team]?.wins || 0,
    losses: matchStats[r.team]?.losses || 0,
    draws: matchStats[r.team]?.draws || 0,
  })).sort((a, b) => {
    const wd = b.wins - a.wins; if (wd) return wd;
    if (rankMethod.includes("Margins")) { const md = b.margin - a.margin; if (md) return md; }
    if (rankMethod.includes("Least Shots Against")) return a.shotsAgainst - b.shotsAgainst;
    if (rankMethod.includes("Percentage")) {
      const ap = a.shotsAgainst ? a.shotsFor / a.shotsAgainst : 0;
      const bp = b.shotsAgainst ? b.shotsFor / b.shotsAgainst : 0;
      return bp - ap;
    }
    return b.gameWins - a.gameWins;
  });
}

// ══════════════════════════════════════════════════════════════════════════
//  ROUND-ROBIN TOURNAMENT LOGIC (unchanged)
// ══════════════════════════════════════════════════════════════════════════
function generateRoundRobin(teams) {
  const list = [...teams];
  if (list.length % 2 !== 0) list.push("BYE");
  const total = list.length, half = total / 2, numRounds = total - 1;
  const rounds = [];
  for (let r = 0; r < numRounds; r++) {
    const round = [];
    for (let i = 0; i < half; i++) {
      const home = list[i], away = list[total - 1 - i];
      if (home !== "BYE" && away !== "BYE")
        round.push({ home, away, rink: i + 1, homeScore: "", awayScore: "" });
    }
    rounds.push(round);
    list.splice(1, 0, list.pop());
  }
  return rounds;
}

function calcLadder(teams, rounds, rankMethod) {
  const s = {};
  teams.forEach(t => { s[t] = { team:t, played:0, wins:0, losses:0, draws:0, ends:0, shotsFor:0, shotsAgainst:0, margin:0 }; });
  rounds.forEach(round => round.forEach(m => {
    const hs = parseInt(m.homeScore), as = parseInt(m.awayScore);
    if (isNaN(hs) || isNaN(as) || !s[m.home] || !s[m.away]) return;
    s[m.home].played++; s[m.away].played++;
    s[m.home].shotsFor += hs; s[m.home].shotsAgainst += as;
    s[m.away].shotsFor += as; s[m.away].shotsAgainst += hs;
    s[m.home].margin += (hs - as); s[m.away].margin += (as - hs);
    if (hs > as) { s[m.home].wins++; s[m.away].losses++; }
    else if (as > hs) { s[m.away].wins++; s[m.home].losses++; }
    else { s[m.home].draws++; s[m.away].draws++; }
  }));
  return Object.values(s).sort((a, b) => {
    const wd = b.wins - a.wins; if (wd) return wd;
    if (rankMethod.includes("Margins")) { const md = b.margin - a.margin; if (md) return md; }
    if (rankMethod.includes("Ends")) { const ed = b.ends - a.ends; if (ed) return ed; }
    if (rankMethod.includes("Percentage")) {
      const ap = a.shotsAgainst ? a.shotsFor / a.shotsAgainst : 0;
      const bp = b.shotsAgainst ? b.shotsFor / b.shotsAgainst : 0;
      return bp - ap;
    }
    if (rankMethod.includes("Least Shots Against")) return a.shotsAgainst - b.shotsAgainst;
    return 0;
  });
}

//  KNOCKOUT LOGIC (unchanged)

function nextPow2(n) { let p = 1; while (p < n) p *= 2; return p; }

function buildBracket(entries, byeMode) {
  const size = nextPow2(entries.length);
  const byeCount = size - entries.length;
  let seeded = [...entries];
  if (byeMode === "Byes Spread Evenly") {
    const result = Array(size).fill(null);
    const byePositions = [];
    const step = size / (byeCount || 1);
    for (let i = 0; i < byeCount; i++) byePositions.push(Math.round(i * step + step / 2) - 1);
    let ei = 0;
    for (let i = 0; i < size; i++) result[i] = byePositions.includes(i) ? "BYE" : seeded[ei++] || null;
    seeded = result;
  } else {
    while (seeded.length < size) seeded.push("BYE");
  }
  const rounds = [];
  let current = [];
  for (let i = 0; i < size; i += 2) {
    current.push({
      id: `r0-m${i / 2}`, p1: seeded[i] || "TBD", p2: seeded[i + 1] || "TBD",
      score1: "", score2: "", rink: "",
      winner: (seeded[i] === "BYE" || seeded[i + 1] === "BYE") ? (seeded[i] === "BYE" ? seeded[i + 1] : seeded[i]) : null,
    });
  }
  rounds.push(current);
  let prev = current;
  while (prev.length > 1) {
    const next = [];
    for (let i = 0; i < prev.length; i += 2)
      next.push({ id: `r${rounds.length}-m${i / 2}`, p1: prev[i].winner || "TBD", p2: prev[i + 1]?.winner || "TBD", score1: "", score2: "", rink: "", winner: null });
    rounds.push(next);
    prev = next;
  }
  return rounds;
}

function advanceWinner(rounds, roundIdx, matchIdx, winner) {
  const nr = rounds.map(r => r.map(m => ({ ...m })));
  nr[roundIdx][matchIdx].winner = winner;
  if (roundIdx + 1 < nr.length) {
    const nm = Math.floor(matchIdx / 2), slot = matchIdx % 2 === 0 ? "p1" : "p2";
    nr[roundIdx + 1][nm][slot] = winner;
    nr[roundIdx + 1][nm].winner = null;
    nr[roundIdx + 1][nm].score1 = "";
    nr[roundIdx + 1][nm].score2 = "";
  }
  return nr;
}

function getRoundName(total, idx) {
  const fromEnd = total - 1 - idx;
  return ["Final","Semi-Finals","Quarter-Finals","Round of 16","Round of 32","Round of 64","Round of 128"][fromEnd] || `Round ${idx + 1}`;
}

function exportBowlsLinkCSV(name, rounds, endsPerMatch) {
  const meta = endsPerMatch ? `# Ends per match: ${endsPerMatch}\n` : "";
  let rows = "Round,Section,Game,Rink,Home Team,Away Team,Home Score,Away Score\n";
  rounds.forEach((round, ri) => round.forEach(m => {
    rows += `${ri + 1},"${m.section || ""}","${m.game || ""}",${m.rink},"${m.home}","${m.away}",${m.homeScore || ""},${m.awayScore || ""}\n`;
  }));
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([meta + rows], { type: "text/csv" }));
  a.download = `${name.replace(/\s+/g, "_")}_BowlsLink.csv`;
  a.click();
}

function Sel({ value, onChange, options, style = {} }) { return <select value={value} onChange={e => onChange(e.target.value)} style={{ border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 12px", fontSize: 14, fontFamily: "inherit", color: C.slate, background: C.white, outline: "none", ...style }}>{options.map(o => <option key={o.value ?? o} value={o.value ?? o}>{o.label ?? o}</option>)}</select>; }
function Label({ children }) { return <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.slate, marginBottom: 6 }}>{children}</label>; }
function EmptyState({ msg, sub }) { return <div style={{ padding: 60, textAlign: "center", color: C.half }}><div style={{ fontSize: 48, marginBottom: 16 }}><LawnBowl size={48} /></div><div style={{ fontSize: 16, fontWeight: 600 }}>{msg}</div><div style={{ fontSize: 14, marginTop: 8 }}>{sub || "Use the Setup tabs to get started."}</div></div>; }

// ── BD Monogram Logo (BowlsDirector identity mark) ───────────────────────
function LawnBowl({ size = 32 }) {
  // Dark green circle with gold ring and white "BD" lettermark
  const r = 30;
  const cx = 32, cy = 32;
  return (
    <svg
      width={size} height={size} viewBox="0 0 64 64" fill="none"
      xmlns="http://www.w3.org/2000/svg"
      style={{ display:"inline-block", verticalAlign:"middle", flexShrink:0 }}
    >
      {/* Outer gold ring */}
      <circle cx={cx} cy={cy} r="31" fill="#c8973a"/>
      {/* Inner green circle */}
      <circle cx={cx} cy={cy} r="27" fill="#1a6b3c"/>
      {/* Subtle inner shadow ring */}
      <circle cx={cx} cy={cy} r="27" fill="none" stroke="#134f2d" strokeWidth="2"/>
      {/* BD lettermark — bold, centred, white */}
      <text
        x="32" y="43"
        textAnchor="middle"
        fontFamily="Arial Black, Arial, sans-serif"
        fontWeight="900"
        fontSize="26"
        letterSpacing="-1"
        fill="#ffffff"
      >BD</text>
    </svg>
  );
}


function SectionTA({ label, value, onChange, placeholder, rows = 8 }) {
  return (
    <div>
      {label && <Label>{label}</Label>}
      <textarea value={value} onChange={e => onChange(e.target.value)} rows={rows} placeholder={placeholder}
        style={{ width: "100%", boxSizing: "border-box", border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px 12px", fontSize: 13, fontFamily: "inherit", resize: "vertical", outline: "none", color: C.slate }} />
    </div>
  );
}

//  TOURNAMENT SETUP (round-robin)
// ══════════════════════════════════════════════════════════════════════════
function Setup({ tournament, setTournament }) {
  const [name, setName] = useState(tournament?.name || "");
  const [format, setFormat] = useState(tournament?.format || "Triples");
  const [rank, setRank] = useState(tournament?.rankMethod || RANKING_METHODS[0]);
  const [teamInput, setTeamInput] = useState(tournament?.teams.join("\n") || "");
  const [endsPerMatch, setEndsPerMatch] = useState(tournament?.endsPerMatch || "21");
  const [saved, setSaved] = useState(false);
  const teams = teamInput.split("\n").map(t => t.trim()).filter(Boolean);

  const generate = () => {
    if (!name.trim() || teams.length < 2) return;
    setTournament({ name: name.trim(), format, rankMethod: rank, endsPerMatch, teams, rounds: generateRoundRobin(teams) });
    setSaved(true); setTimeout(() => setSaved(false), 2500);
  };

  return (
    <div style={{ padding: 28, maxWidth: 700, margin: "0 auto" }}>
      <h2 style={{ color: C.greenDk, margin: "0 0 20px", fontSize: 20, fontWeight: 800 }}>Tournament Setup — Round Robin</h2>
      <Card style={{ marginBottom: 16 }}>
        <h3 style={{ margin: "0 0 14px", color: C.slate, fontSize: 14 }}>Details</h3>
        <div style={{ display: "grid", gap: 12 }}>
          <div><Label>Tournament Name</Label><Input value={name} onChange={setName} placeholder="e.g. Summer Triples 2026" /></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
            <div><Label>Format</Label><Sel value={format} onChange={setFormat} options={FORMATS} style={{ width: "100%" }} /></div>
            <div><Label>Ranking Method</Label><Sel value={rank} onChange={setRank} options={RANKING_METHODS} style={{ width: "100%" }} /></div>
            <div>
              <Label>Ends per Match</Label>
              <Sel value={endsPerMatch} onChange={setEndsPerMatch}
                options={["15","18","21","25","30","36","Unknown"].map(v => ({ value: v, label: v === "Unknown" ? "Unknown / Open" : `${v} ends` }))}
                style={{ width: "100%" }} />
              <div style={{ fontSize: 11, color: C.half, marginTop: 4 }}>Used by BA Scoring App & BowlsLink</div>
            </div>
          </div>
        </div>
      </Card>
      <Card style={{ marginBottom: 16 }}>
        <h3 style={{ margin: "0 0 6px", color: C.slate, fontSize: 14 }}>Team List</h3>
        <p style={{ margin: "0 0 10px", fontSize: 12, color: C.half }}>One team per line. BYE added automatically for odd numbers.</p>
        <SectionTA value={teamInput} onChange={setTeamInput} placeholder={"Sunrise BC\nHarbour Club\nEagle Heights\n..."} rows={10} />
        <div style={{ marginTop: 7, fontSize: 12, color: C.half }}>
          {teams.length} teams{teams.length > 1 ? ` → ${teams.length % 2 === 0 ? teams.length - 1 : teams.length} rounds` : ""}
        </div>
      </Card>
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        <Btn onClick={generate} disabled={!name.trim() || teams.length < 2}>🎲 Generate Draw</Btn>
        {saved && <span style={{ color: C.green, fontWeight: 600, fontSize: 13 }}>✓ Saved!</span>}
      </div>
      {tournament && <div style={{ marginTop: 12, padding: 11, background: C.goldLt, borderRadius: 7, border: `1px solid ${C.gold}40`, fontSize: 12 }}>⚠️ Re-generating resets all scores. Export CSV first.</div>}
    </div>
  );
}

//  VERSATILITY SETUP & MANAGEMENT
// ══════════════════════════════════════════════════════════════════════════
function Versatility({ vers, setVers }) {
  const [tab, setTab] = useState(vers ? "draw" : "setup");

  // ── SETUP STATE ──
  const [name, setName] = useState(vers?.name || "");
  const [format, setFormat] = useState(vers?.format || "Triples");
  const [rank, setRank] = useState(vers?.rankMethod || "Wins → Margins");
  const [numSections, setNumSections] = useState(vers?.sections?.length > 1 ? "2" : "1");
  const [secAInput, setSecAInput] = useState(vers?.sections?.[0]?.join("\n") || "");
  const [secBInput, setSecBInput] = useState(vers?.sections?.[1]?.join("\n") || "");
  const [roundConfig, setRoundConfig] = useState(
    vers?.roundConfig?.map(r => ({ ...r })) ||
    [{ gamesPerPair: 2 }, { gamesPerPair: 2 }]
  );
  const [saved, setSaved] = useState(false);
  const [activeRound, setActiveRound] = useState(0);

  const secA = secAInput.split("\n").map(t => t.trim()).filter(Boolean);
  const secB = secBInput.split("\n").map(t => t.trim()).filter(Boolean);
  const sections = numSections === "2" ? [secA, secB] : [secA];
  const allTeams = [...new Set([...secA, ...secB])];

  const addRound = () => setRoundConfig(prev => [...prev, { gamesPerPair: 2 }]);
  const removeRound = (i) => setRoundConfig(prev => prev.filter((_, idx) => idx !== i));
  const setGames = (i, v) => setRoundConfig(prev => prev.map((r, idx) => idx !== i ? r : { ...r, gamesPerPair: parseInt(v) || 1 }));

  const generate = () => {
    if (!name.trim() || secA.length < 2) return;
    const activeSections = numSections === "2" ? [secA, secB.length >= 2 ? secB : secA] : [secA];
    const rounds = buildVersatilityDraw(activeSections, roundConfig);
    const usedSections = numSections === "2" ? [secA, secB.length >= 2 ? secB : secA] : [secA];
    setVers({ name: name.trim(), format, rankMethod: rank, sections: usedSections, roundConfig, rounds });
    setSaved(true); setTimeout(() => setSaved(false), 2000);
    setTab("draw");
  };

  const updateScore = (ri, mi, field, val) => {
    const rounds = vers.rounds.map((r, rIdx) => rIdx !== ri ? r : r.map((m, mIdx) => mIdx !== mi ? m : { ...m, [field]: val }));
    setVers({ ...vers, rounds });
  };

  const updateRink = (ri, mi, val) => {
    const rounds = vers.rounds.map((r, rIdx) => rIdx !== ri ? r : r.map((m, mIdx) => mIdx !== mi ? m : { ...m, rink: val }));
    setVers({ ...vers, rounds });
  };

  const ladder = vers ? calcVersatilityLadder(
    [...new Set(vers.rounds.flat().map(m => m.home).concat(vers.rounds.flat().map(m => m.away)))],
    vers.rounds, vers.rankMethod
  ) : [];

  const VTabBtn = ({ id, label }) => (
    <button onClick={() => setTab(id)} style={{ border: "none", borderRadius: 6, padding: "7px 14px", cursor: "pointer", background: tab === id ? C.teal : C.greenLt, color: tab === id ? "#fff" : C.teal, fontWeight: tab === id ? 700 : 500, fontSize: 13, fontFamily: "inherit" }}>{label}</button>
  );

  return (
    <div style={{ padding: 28, maxWidth: 960, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
        <div>
          <h2 style={{ color: C.greenDk, margin: "0 0 4px", fontSize: 20, fontWeight: 800 }}>Versatility / Sectional Draw</h2>
          <p style={{ margin: 0, fontSize: 13, color: C.half }}>Multiple games per round — A game, B game, sectional splits</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {vers && <Btn variant="ghost" small onClick={() => printVersatilityFixtures(vers.name, vers.rounds, vers.format)}>🖨 Print Draw</Btn>}
          {vers && <Btn variant="secondary" small onClick={() => exportBowlsLinkCSV(vers.name, vers.rounds)}>⬇ CSV</Btn>}
        </div>
      </div>

      {/* Sub-tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        <VTabBtn id="setup" label="⚙️ Setup" />
        {vers && <VTabBtn id="draw" label="📋 Draw" />}
        {vers && <VTabBtn id="scores" label="🎯 Scores" />}
        {vers && <VTabBtn id="ladder" label="🏆 Ladder" />}
      </div>

      {/* ── SETUP TAB ── */}
      {tab === "setup" && (
        <div style={{ maxWidth: 680 }}>
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 14px", color: C.slate, fontSize: 14 }}>Competition Details</h3>
            <div style={{ display: "grid", gap: 12 }}>
              <div><Label>Competition Name</Label><Input value={name} onChange={setName} placeholder="e.g. Club Versatility Championship 2026" /></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><Label>Format</Label><Sel value={format} onChange={setFormat} options={FORMATS} style={{ width: "100%" }} /></div>
                <div><Label>Ranking Method</Label><Sel value={rank} onChange={setRank} options={["Wins → Margins", "Wins → Margins → Least Shots Against", "Wins → Margins → Percentage", "Wins → Ends"]} style={{ width: "100%" }} /></div>
              </div>
              <div>
                <Label>Number of Sections</Label>
                <Sel value={numSections} onChange={setNumSections} options={[{ value: "1", label: "1 Section (all teams together)" }, { value: "2", label: "2 Sections (Section A & Section B)" }]} style={{ width: "100%" }} />
              </div>
            </div>
          </Card>

          {/* Team entry */}
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 10px", color: C.slate, fontSize: 14 }}>
              {numSections === "2" ? "Section A Teams" : "Teams"}
            </h3>
            <SectionTA value={secAInput} onChange={setSecAInput}
              placeholder={numSections === "2" ? "Team A1\nTeam A2\nTeam A3\n..." : "Team 1\nTeam 2\nTeam 3\n..."}
              rows={7} />
            <div style={{ marginTop: 6, fontSize: 12, color: C.half }}>{secA.length} teams</div>
          </Card>

          {numSections === "2" && (
            <Card style={{ marginBottom: 14 }}>
              <h3 style={{ margin: "0 0 10px", color: C.slate, fontSize: 14 }}>Section B Teams</h3>
              <SectionTA value={secBInput} onChange={setSecBInput} placeholder={"Team B1\nTeam B2\nTeam B3\n..."} rows={7} />
              <div style={{ marginTop: 6, fontSize: 12, color: C.half }}>{secB.length} teams</div>
            </Card>
          )}

          {/* Round configuration */}
          <Card style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h3 style={{ margin: 0, color: C.slate, fontSize: 14 }}>Round Configuration</h3>
              <Btn small variant="secondary" onClick={addRound}>+ Add Round</Btn>
            </div>
            <p style={{ margin: "0 0 12px", fontSize: 12, color: C.half }}>
              Set how many games (A, B…) are played per pairing in each round. Most versatility events use 2 games (A & B) per round.
            </p>

            {/* Legend */}
            <div style={{ display: "flex", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
              {[{ label: "1 game per pair = A only", color: "#fff9f0", border: "#e8c97a" }, { label: "2 games per pair = A & B", color: "#f0f7ff", border: "#7ab8e8" }].map(l => (
                <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: C.half }}>
                  <span style={{ width: 14, height: 14, background: l.color, border: `1px solid ${l.border}`, borderRadius: 2 }} />
                  {l.label}
                </div>
              ))}
            </div>

            <div style={{ display: "grid", gap: 8 }}>
              {roundConfig.map((r, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "80px 1fr auto", gap: 10, alignItems: "center", padding: "10px 14px", borderRadius: 7, background: r.gamesPerPair === 2 ? "#f0f7ff" : r.gamesPerPair === 1 ? "#fff9f0" : C.greenLt, border: `1px solid ${r.gamesPerPair === 2 ? "#7ab8e840" : r.gamesPerPair === 1 ? "#e8c97a40" : C.border}` }}>
                  <span style={{ fontWeight: 700, color: C.slate, fontSize: 13 }}>Round {i + 1}</span>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    {[1, 2].map(n => (
                      <button key={n} onClick={() => setGames(i, n)} style={{ padding: "5px 14px", borderRadius: 5, border: `2px solid ${r.gamesPerPair === n ? C.teal : C.border}`, background: r.gamesPerPair === n ? C.teal : C.white, color: r.gamesPerPair === n ? "#fff" : C.half, fontWeight: r.gamesPerPair === n ? 700 : 400, cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>
                        {n} game{n > 1 ? "s" : ""} {n === 1 ? "(A only)" : "(A & B)"}
                      </button>
                    ))}
                  </div>
                  {roundConfig.length > 1 && <button onClick={() => removeRound(i)} style={{ background: "none", border: "none", cursor: "pointer", color: C.half, fontSize: 16 }}>✕</button>}
                </div>
              ))}
            </div>

            {/* Summary */}
            <div style={{ marginTop: 12, padding: "8px 12px", background: C.greenLt, borderRadius: 6, fontSize: 12, color: C.greenDk }}>
              <strong>Summary:</strong> {roundConfig.length} rounds · {roundConfig.map((r, i) => `R${i + 1}: ${r.gamesPerPair === 1 ? "A" : "A&B"}`).join(", ")}
              {secA.length >= 2 && ` · ${secA.length} teams${numSections === "2" && secB.length >= 2 ? ` + ${secB.length}` : ""} = ~${roundConfig.reduce((sum, r) => sum + r.gamesPerPair * Math.floor((numSections === "2" ? secA.length + secB.length : secA.length) / 2), 0)} total games`}
            </div>
          </Card>

          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <Btn onClick={generate} variant="teal" disabled={!name.trim() || secA.length < 2}>🔀 Generate Versatility Draw</Btn>
            {saved && <span style={{ color: C.green, fontWeight: 600, fontSize: 13 }}>✓ Draw generated!</span>}
          </div>
        </div>
      )}

      {/* ── DRAW TAB ── */}
      {tab === "draw" && vers && (
        <div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
            <Badge color={C.teal}>{vers.format}</Badge>
            <Badge color={C.slate}>{vers.sections.reduce((n, s) => n + s.length, 0)} Teams</Badge>
            <Badge color={C.green}>{vers.rounds.length} Rounds</Badge>
            {vers.sections.length > 1 && <Badge color={C.purple}>{vers.sections.length} Sections</Badge>}
            <Badge color={C.gold}>{vers.roundConfig.map((r, i) => `R${i + 1}:${r.gamesPerPair === 1 ? "A" : "A&B"}`).join(" · ")}</Badge>
          </div>

          {vers.rounds.map((round, ri) => {
            // Group by section + home/away pair for display
            const grouped = {};
            round.forEach(m => {
              const key = (m.section || "") + "|||" + m.home + "|||" + m.away;
              if (!grouped[key]) grouped[key] = { section: m.section, home: m.home, away: m.away, games: [] };
              grouped[key].games.push(m);
            });

            return (
              <Card key={ri} style={{ marginBottom: 14, padding: 0, overflow: "hidden" }}>
                <div style={{ background: C.greenDk, color: "#fff", padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontWeight: 800, fontSize: 14 }}>ROUND {ri + 1}</span>
                  <span style={{ fontSize: 12, opacity: 0.7 }}>{round.length} games · {vers.roundConfig[ri]?.gamesPerPair === 1 ? "A game only" : "A & B games"}</span>
                </div>

                {/* Headers */}
                <div style={{ display: "grid", gridTemplateColumns: "50px 1fr", background: C.off, padding: "0" }}>
                  {Object.values(grouped).map((g, gi) => {
                    const gamesInPair = g.games.length;
                    return (
                      <div key={gi} style={{ gridColumn: "1 / -1", display: "grid", gridTemplateColumns: `50px ${gamesInPair > 1 ? "70px " : ""}1fr repeat(${gamesInPair}, 1fr) 70px 1fr`, borderBottom: `1px solid ${C.border}`, alignItems: "stretch" }}>
                        {/* Section label */}
                        <div style={{ padding: "10px 8px", display: "flex", alignItems: "center", justifyContent: "center", borderRight: `1px solid ${C.border}`, background: g.section ? C.teal + "15" : "transparent" }}>
                          {g.section && <span style={{ fontSize: 9, fontWeight: 800, color: C.teal, letterSpacing: 1, writingMode: "horizontal-tb" }}>{g.section.replace("Section ", "")}</span>}
                        </div>

                        {/* Home team */}
                        <div style={{ padding: "10px 12px", display: "flex", alignItems: "center", fontWeight: 600, color: C.slate, fontSize: 13, borderRight: `1px solid ${C.border}` }}>{g.home}</div>

                        {/* Games */}
                        {g.games.map((m, mgi) => {
                          const mi = vers.rounds[ri].indexOf(m);
                          const done = m.homeScore !== "" && m.awayScore !== "";
                          return (
                            <div key={mgi} style={{ padding: "8px", display: "grid", gridTemplateColumns: "1fr 44px 44px 1fr", gap: 4, alignItems: "center", background: m.game === "B" ? "#f0f7ff" : m.game === "A" ? "#fff9f0" : C.white, borderRight: `1px solid ${C.border}` }}>
                              <div style={{ fontSize: 10, fontWeight: 700, color: C.teal, textAlign: "center" }}>
                                Game {m.game}<br />
                                <input value={m.rink} onChange={e => updateRink(ri, mi, e.target.value)} placeholder="Rink"
                                  style={{ width: 38, textAlign: "center", border: `1px solid ${C.border}`, borderRadius: 4, padding: "2px 4px", fontSize: 11, fontFamily: "inherit" }} />
                              </div>
                              <input type="number" min="0" max="99" value={m.homeScore} onChange={e => updateScore(ri, mi, "homeScore", e.target.value)} placeholder="–"
                                style={{ textAlign: "center", border: `2px solid ${done ? C.green : C.border}`, borderRadius: 5, padding: "6px 4px", fontSize: 16, fontWeight: 700, fontFamily: "inherit", color: C.greenDk, outline: "none", width: "100%" }} />
                              <input type="number" min="0" max="99" value={m.awayScore} onChange={e => updateScore(ri, mi, "awayScore", e.target.value)} placeholder="–"
                                style={{ textAlign: "center", border: `2px solid ${done ? C.green : C.border}`, borderRadius: 5, padding: "6px 4px", fontSize: 16, fontWeight: 700, fontFamily: "inherit", color: C.greenDk, outline: "none", width: "100%" }} />
                              <div style={{ fontSize: 10, color: C.half, textAlign: "center" }}>
                                {done ? <span style={{ color: C.green, fontWeight: 700 }}>✓</span> : ""}
                              </div>
                            </div>
                          );
                        })}

                        {/* Away team */}
                        <div style={{ padding: "10px 12px", display: "flex", alignItems: "center", fontWeight: 600, color: C.slate, fontSize: 13 }}>{g.away}</div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {/* ── SCORES TAB ── */}
      {tab === "scores" && vers && (
        <div>
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {vers.rounds.map((_, ri) => (
              <button key={ri} onClick={() => setActiveRound(ri)} style={{ border: "none", borderRadius: 6, padding: "7px 14px", cursor: "pointer", background: ri === activeRound ? C.teal : C.greenLt, color: ri === activeRound ? "#fff" : C.teal, fontWeight: 700, fontSize: 13, fontFamily: "inherit" }}>R{ri + 1}</button>
            ))}
          </div>
          <Card>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
              <span style={{ background: C.teal, color: "#fff", borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 700 }}>ROUND {activeRound + 1}</span>
              <span style={{ fontSize: 12, color: C.half }}>
                {vers.rounds[activeRound]?.filter(m => m.homeScore !== "" && m.awayScore !== "").length}/{vers.rounds[activeRound]?.length} scored
              </span>
            </div>
            <div style={{ display: "grid", gap: 8 }}>
              {(() => {
                const round = vers.rounds[activeRound] || [];
                const grouped = {};
                round.forEach((m, mi) => {
                  const key = (m.section || "") + "|||" + m.home + "|||" + m.away;
                  if (!grouped[key]) grouped[key] = { section: m.section, home: m.home, away: m.away, games: [] };
                  grouped[key].games.push({ ...m, _mi: mi });
                });
                return Object.values(grouped).map((g, gi) => {
                  const allDone = g.games.every(m => m.homeScore !== "" && m.awayScore !== "");
                  const totalH = g.games.reduce((s, m) => s + (parseInt(m.homeScore) || 0), 0);
                  const totalA = g.games.reduce((s, m) => s + (parseInt(m.awayScore) || 0), 0);
                  return (
                    <div key={gi} style={{ borderRadius: 8, border: `1px solid ${allDone ? C.green + "50" : C.border}`, background: allDone ? C.greenLt : C.off, overflow: "hidden" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 14px", borderBottom: `1px solid ${C.border}`, background: allDone ? "#c8f0d8" : C.white }}>
                        <span style={{ fontWeight: 700, color: C.slate, fontSize: 13 }}>{g.home}</span>
                        {g.section && <Badge color={C.teal}>{g.section}</Badge>}
                        <span style={{ fontWeight: 700, color: C.slate, fontSize: 13 }}>{g.away}</span>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: `repeat(${g.games.length}, 1fr)`, gap: 0 }}>
                        {g.games.map((m, mgi) => (
                          <div key={mgi} style={{ padding: "10px 12px", borderRight: mgi < g.games.length - 1 ? `1px solid ${C.border}` : "none", background: m.game === "B" ? "#f0f7ff" : "#fff9f0" }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: C.teal, marginBottom: 6, display: "flex", justifyContent: "space-between" }}>
                              <span>Game {m.game}</span>
                              {m.rink && <span style={{ color: C.half }}>Rink {m.rink}</span>}
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              <input type="number" min="0" max="99" value={m.homeScore}
                                onChange={e => updateScore(activeRound, m._mi, "homeScore", e.target.value)}
                                placeholder="–" style={{ width: 48, textAlign: "center", border: `2px solid ${C.teal}`, borderRadius: 6, padding: "6px", fontSize: 18, fontWeight: 700, fontFamily: "inherit", outline: "none" }} />
                              <span style={{ color: C.half, fontWeight: 700 }}>v</span>
                              <input type="number" min="0" max="99" value={m.awayScore}
                                onChange={e => updateScore(activeRound, m._mi, "awayScore", e.target.value)}
                                placeholder="–" style={{ width: 48, textAlign: "center", border: `2px solid ${C.teal}`, borderRadius: 6, padding: "6px", fontSize: 18, fontWeight: 700, fontFamily: "inherit", outline: "none" }} />
                            </div>
                          </div>
                        ))}
                      </div>
                      {allDone && g.games.length > 1 && (
                        <div style={{ padding: "6px 14px", background: totalH > totalA ? "#e8f5ee" : totalA > totalH ? "#fdecea" : "#f5f5f5", borderTop: `1px solid ${C.border}`, fontSize: 12, fontWeight: 700, display: "flex", justifyContent: "space-between" }}>
                          <span style={{ color: totalH > totalA ? C.green : C.half }}>Total: {totalH}</span>
                          <span style={{ color: C.half }}>Match: {totalH > totalA ? g.home + " wins" : totalA > totalH ? g.away + " wins" : "Draw"}</span>
                          <span style={{ color: totalA > totalH ? C.red : C.half }}>Total: {totalA}</span>
                        </div>
                      )}
                    </div>
                  );
                });
              })()}
            </div>
          </Card>
        </div>
      )}

      {/* ── LADDER TAB ── */}
      {tab === "ladder" && vers && (
        <div>
          <div style={{ marginBottom: 14 }}>
            <p style={{ margin: 0, fontSize: 13, color: C.half }}>{vers.name} · {vers.rankMethod} · Match wins = combined score across A & B games</p>
          </div>
          <Card style={{ padding: 0, overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ background: C.greenDk }}>
                  {["Pos", "Team", "Matches P", "Match W", "Match L", "Game W", "Game L", "For", "Against", "Margin"].map(h => (
                    <th key={h} style={{ padding: "10px 12px", color: "#fff", fontSize: 11, fontWeight: 700, textAlign: h === "Team" ? "left" : "center", whiteSpace: "nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {ladder.map((row, i) => (
                  <tr key={row.team} style={{ borderBottom: `1px solid ${C.border}`, background: i % 2 === 0 ? C.white : C.off }}>
                    <td style={{ padding: "10px 12px", textAlign: "center" }}>
                      {i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : <span style={{ color: C.half, fontSize: 12, fontWeight: 600 }}>{i + 1}</span>}
                    </td>
                    <td style={{ padding: "10px 12px", fontWeight: 600, color: C.slate }}>{row.team}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center", color: C.half }}>{row.wins + row.losses + row.draws}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, color: C.green }}>{row.wins}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center", color: C.red }}>{row.losses}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center", color: C.teal }}>{row.gameWins}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center", color: C.half }}>{row.gameLosses}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center" }}>{row.shotsFor}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center" }}>{row.shotsAgainst}</td>
                    <td style={{ padding: "10px 12px", textAlign: "center", fontWeight: 700, color: row.margin >= 0 ? C.green : C.red }}>{row.margin > 0 ? "+" : ""}{row.margin}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
          <div style={{ marginTop: 10, fontSize: 12, color: C.half, padding: "8px 12px", background: C.goldLt, borderRadius: 6, border: `1px solid ${C.gold}30` }}>
            💡 <strong>Match wins</strong> are determined by total score across all games (A+B) per pairing per round. <strong>Game wins</strong> track individual A & B game results.
          </div>
        </div>
      )}

      {!vers && tab !== "setup" && <EmptyState msg="No versatility draw created yet." sub="Use the Setup tab to configure and generate your draw." />}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  CHAMPIONSHIP (knockout)
// ══════════════════════════════════════════════════════════════════════════
function Championship({ champ, setChamp }) {
  const [name, setName] = useState(champ?.name || "");
  const [format, setFormat] = useState(champ?.format || "Singles");
  const [byeMode, setByeMode] = useState(champ?.byeMode || "Byes at Bottom");
  const [entryInput, setEntryInput] = useState(champ?.entries?.join("\n") || "");
  const [panel, setPanel] = useState(champ ? "bracket" : "setup");
  const [saved, setSaved] = useState(false);

  const entries = entryInput.split("\n").map(t => t.trim()).filter(Boolean);
  const size = nextPow2(Math.max(entries.length, 2));
  const byes = size - entries.length;

  const generate = () => {
    if (!name.trim() || entries.length < 2) return;
    setChamp({ name: name.trim(), format, byeMode, entries, rounds: buildBracket(entries, byeMode) });
    setSaved(true); setTimeout(() => setSaved(false), 2000);
    setPanel("bracket");
  };

  const updateMatch = (ri, mi, field, val) => {
    const rounds = champ.rounds.map(r => r.map(m => ({ ...m })));
    rounds[ri][mi][field] = val;
    setChamp({ ...champ, rounds });
  };

  const setWinner = (ri, mi, winner) => setChamp({ ...champ, rounds: advanceWinner(champ.rounds, ri, mi, winner) });
  const champion = champ?.rounds[champ.rounds.length - 1]?.[0]?.winner;

  const PBtn = ({ id, label }) => <button onClick={() => setPanel(id)} style={{ border: "none", borderRadius: 6, padding: "7px 14px", cursor: "pointer", background: panel === id ? C.purple : C.greenLt, color: panel === id ? "#fff" : C.purple, fontWeight: panel === id ? 700 : 500, fontSize: 13, fontFamily: "inherit" }}>{label}</button>;

  return (
    <div style={{ padding: 28, maxWidth: "100%", margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
        <div>
          <h2 style={{ color: C.greenDk, margin: "0 0 4px", fontSize: 20, fontWeight: 800 }}>Championship Draw</h2>
          <p style={{ margin: 0, fontSize: 13, color: C.half }}>Knockout brackets — Singles, Pairs, Triples, Fours</p>
        </div>
        {champ && <Btn variant="ghost" small onClick={() => printBracket(champ.name, champ.format, champ.rounds)}>🖨 Print Draw</Btn>}
      </div>

      {champion && (
        <div style={{ background: "linear-gradient(135deg,#c8973a,#e8b84b)", borderRadius: 10, padding: "14px 22px", marginBottom: 20, display: "inline-flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 32 }}>🏆</span>
          <div><div style={{ color: "#6b4a00", fontSize: 11, fontWeight: 700, letterSpacing: 1 }}>CHAMPION</div><div style={{ color: "#3d2600", fontSize: 20, fontWeight: 800 }}>{champion}</div></div>
        </div>
      )}

      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        <PBtn id="setup" label="⚙️ Setup" />
        {champ && <PBtn id="bracket" label="🏅 Bracket" />}
        {champ && <PBtn id="scores" label="🎯 Enter Scores" />}
      </div>

      {panel === "setup" && (
        <div style={{ maxWidth: 640 }}>
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 14px", color: C.slate, fontSize: 14 }}>Details</h3>
            <div style={{ display: "grid", gap: 12 }}>
              <div><Label>Championship Name</Label><Input value={name} onChange={setName} placeholder="e.g. Club Singles Championship 2026" /></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div><Label>Format</Label><Sel value={format} onChange={setFormat} options={FORMATS} style={{ width: "100%" }} /></div>
                <div><Label>Bye Placement</Label><Sel value={byeMode} onChange={setByeMode} options={BYE_MODES} style={{ width: "100%" }} /></div>
              </div>
            </div>
          </Card>
          <Card style={{ marginBottom: 14 }}>
            <h3 style={{ margin: "0 0 8px", color: C.slate, fontSize: 14 }}>Entries</h3>
            <p style={{ margin: "0 0 10px", fontSize: 12, color: C.half }}>
              One player or team per line. Bracket auto-sizes.
              {entries.length > 1 && <> <strong style={{ color: C.green }}>{entries.length} entries → {size}-player bracket with {byes} bye{byes !== 1 ? "s" : ""}</strong></>}
            </p>
            <SectionTA value={entryInput} onChange={setEntryInput} placeholder={"John Smith\nMary Jones\nBob Williams\n..."} rows={12} />
          </Card>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <Btn variant="purple" onClick={generate} disabled={!name.trim() || entries.length < 2}>🏅 Generate Bracket</Btn>
            {saved && <span style={{ color: C.green, fontWeight: 600, fontSize: 13 }}>✓ Bracket created!</span>}
          </div>
        </div>
      )}

      {panel === "bracket" && champ && (
        <div style={{ overflowX: "auto", paddingBottom: 16 }}>
          <div style={{ display: "flex", gap: 0, alignItems: "flex-start", minWidth: "max-content" }}>
            {champ.rounds.map((round, ri) => {
              const rName = getRoundName(champ.rounds.length, ri);
              return (
                <div key={ri} style={{ display: "flex", flexDirection: "column", width: 200, flexShrink: 0 }}>
                  <div style={{ background: ri === champ.rounds.length - 1 ? C.gold : C.greenDk, color: "#fff", padding: "8px 12px", fontSize: 11, fontWeight: 800, textAlign: "center", letterSpacing: .8 }}>{rName.toUpperCase()}</div>
                  {round.map((m, mi) => {
                    const isBye = m.p1 === "BYE" || m.p2 === "BYE";
                    const spacer = ri === 0 ? 0 : Math.pow(2, ri) - 1;
                    return (
                      <div key={m.id}>
                        {mi > 0 && <div style={{ height: spacer * 56 + spacer * 4, display: "flex", alignItems: "center" }}>
                          <div style={{ width: 20, height: "100%", borderRight: `2px solid ${C.border}`, borderTop: `1px solid ${C.border}`, borderBottom: `1px solid ${C.border}` }} />
                        </div>}
                        <div style={{ border: `2px solid ${ri === champ.rounds.length - 1 ? C.gold : m.winner ? C.green : C.border}`, borderRadius: 8, margin: "4px 0", background: C.white, overflow: "hidden", opacity: isBye ? 0.4 : 1 }}>
                          {m.rink && <div style={{ background: C.greenLt, padding: "2px 8px", fontSize: 10, color: C.green, fontWeight: 700 }}>Rink {m.rink}</div>}
                          {[{ name: m.p1, score: m.score1 }, { name: m.p2, score: m.score2 }].map((p, pi) => (
                            <div key={pi} onClick={() => !["TBD","BYE"].includes(p.name) && setWinner(ri, mi, p.name)}
                              style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 10px", cursor: ["TBD","BYE"].includes(p.name) ? "default" : "pointer", background: m.winner === p.name ? C.greenLt : "transparent", borderBottom: pi === 0 ? `1px solid ${C.border}` : "none", transition: "background .1s" }}>
                              <span style={{ fontSize: 12, fontWeight: m.winner === p.name ? 800 : 500, color: m.winner === p.name ? C.green : ["TBD","BYE"].includes(p.name) ? C.half : C.slate, maxWidth: 130, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                {m.winner === p.name && "🏆 "}{p.name}
                              </span>
                              {p.score && <span style={{ fontSize: 13, fontWeight: 700, color: C.greenDk, marginLeft: 6 }}>{p.score}</span>}
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {panel === "scores" && champ && (
        <div>
          {champ.rounds.map((round, ri) => {
            const rName = getRoundName(champ.rounds.length, ri);
            const real = round.filter(m => m.p1 !== "TBD" && m.p2 !== "TBD" && m.p1 !== "BYE" && m.p2 !== "BYE");
            if (!real.length) return null;
            return (
              <Card key={ri} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, paddingBottom: 10, borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ background: ri === champ.rounds.length - 1 ? C.gold : C.greenDk, color: "#fff", borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 700 }}>{rName}</span>
                  <span style={{ color: C.half, fontSize: 12 }}>{real.filter(m => m.winner).length}/{real.length} complete</span>
                </div>
                {real.map((m) => {
                  const mi = round.indexOf(m);
                  return (
                    <div key={m.id} style={{ display: "grid", gridTemplateColumns: "60px 1fr 56px 24px 56px 1fr 120px", gap: 7, alignItems: "center", padding: "9px 0", borderBottom: `1px solid ${C.border}40` }}>
                      <input value={m.rink} onChange={e => updateMatch(ri, mi, "rink", e.target.value)} placeholder="Rink"
                        style={{ textAlign: "center", border: `1px solid ${C.border}`, borderRadius: 5, padding: "5px", fontSize: 12, fontFamily: "inherit", width: "100%" }} />
                      <span style={{ fontWeight: 600, color: m.winner === m.p1 ? C.green : C.slate, fontSize: 13 }}>{m.p1}</span>
                      <input type="number" min="0" value={m.score1} onChange={e => updateMatch(ri, mi, "score1", e.target.value)} placeholder="–"
                        style={{ textAlign: "center", border: `2px solid ${C.green}`, borderRadius: 6, padding: "5px", fontSize: 16, fontWeight: 700, fontFamily: "inherit", color: C.greenDk, outline: "none", width: "100%" }} />
                      <span style={{ textAlign: "center", color: C.half, fontSize: 11, fontWeight: 700 }}>v</span>
                      <input type="number" min="0" value={m.score2} onChange={e => updateMatch(ri, mi, "score2", e.target.value)} placeholder="–"
                        style={{ textAlign: "center", border: `2px solid ${C.green}`, borderRadius: 6, padding: "5px", fontSize: 16, fontWeight: 700, fontFamily: "inherit", color: C.greenDk, outline: "none", width: "100%" }} />
                      <span style={{ fontWeight: 600, color: m.winner === m.p2 ? C.green : C.slate, fontSize: 13, textAlign: "right" }}>{m.p2}</span>
                      <div style={{ display: "flex", gap: 3 }}>
                        <button onClick={() => setWinner(ri, mi, m.p1)} style={{ flex: 1, background: m.winner === m.p1 ? C.green : C.greenLt, color: m.winner === m.p1 ? "#fff" : C.green, border: "none", borderRadius: 4, padding: "5px 3px", fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>✓ {m.p1.split(" ")[0]}</button>
                        <button onClick={() => setWinner(ri, mi, m.p2)} style={{ flex: 1, background: m.winner === m.p2 ? C.green : C.greenLt, color: m.winner === m.p2 ? "#fff" : C.green, border: "none", borderRadius: 4, padding: "5px 3px", fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>✓ {m.p2.split(" ")[0]}</button>
                      </div>
                    </div>
                  );
                })}
              </Card>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  FIXTURES (tournament round-robin only)
// ══════════════════════════════════════════════════════════════════════════
function Fixtures({ tournament, setTournament }) {
  if (!tournament) return <EmptyState msg="No tournament set up yet." sub="Go to Tournament Setup first." />;
  const updateRink = (ri, mi, val) => {
    const rounds = tournament.rounds.map((r, rIdx) => rIdx !== ri ? r : r.map((m, mIdx) => mIdx !== mi ? m : { ...m, rink: val }));
    setTournament({ ...tournament, rounds });
  };
  return (
    <div style={{ padding: 28, maxWidth: 880, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
        <div>
          <h2 style={{ color: C.greenDk, margin: "0 0 6px", fontSize: 20, fontWeight: 800 }}>{tournament.name}</h2>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}><Badge>{tournament.format}</Badge><Badge color={C.slate}>{tournament.teams.length} Teams</Badge><Badge color={C.gold}>{tournament.rounds.length} Rounds</Badge></div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn variant="secondary" small onClick={() => { const w=window.open("","_blank"); w.document.write(`<!DOCTYPE html><html><head><title>${tournament.name}</title><style>body{font-family:Arial,sans-serif;padding:24px;}.rt{background:#1a6b3c;color:#fff;padding:5px 12px;font-weight:bold;font-size:12px;margin:16px 0 6px;}table{width:100%;border-collapse:collapse;font-size:12px;}th{background:#e8f5ee;padding:5px 8px;border:1px solid #d0ddd4;}td{padding:6px 8px;border:1px solid #d0ddd4;}.sb{display:inline-block;width:34px;height:18px;border:1px solid #999;}button{background:#1a6b3c;color:#fff;border:none;padding:7px 16px;border-radius:4px;cursor:pointer;margin-bottom:14px;}@media print{button{display:none;}}</style></head><body><button onclick="window.print()">🖨 Print</button><h1 style="color:#1a6b3c">${tournament.name}</h1>${tournament.rounds.map((r,ri)=>`<div class="rt">ROUND ${ri+1}</div><table><tr><th>Rink</th><th>Home</th><th>Score</th><th>vs</th><th>Score</th><th>Away</th></tr>${r.map(m=>`<tr><td>${m.rink}</td><td><b>${m.home}</b></td><td><span class="sb">${m.homeScore||""}</span></td><td style="text-align:center">v</td><td><span class="sb">${m.awayScore||""}</span></td><td><b>${m.away}</b></td></tr>`).join("")}</table>`).join("")}</body></html>`); w.document.close(); }}>🖨 Print</Btn>
          <Btn variant="ghost" small onClick={() => exportBowlsLinkCSV(tournament.name, tournament.rounds)}>⬇ BowlsLink CSV</Btn>
        </div>
      </div>
      {tournament.rounds.map((round, ri) => (
        <Card key={ri} style={{ marginBottom: 12, padding: 0, overflow: "hidden" }}>
          <div style={{ background: C.greenDk, color: "#fff", padding: "9px 16px", display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontWeight: 800, fontSize: 13 }}>ROUND {ri + 1}</span>
            <span style={{ fontSize: 12, opacity: .7 }}>{round.length} matches</span>
          </div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr style={{ background: C.off }}>{["Rink","Home","","vs","","Away","Result"].map(h => <th key={h} style={{ padding: "7px 10px", fontWeight: 700, fontSize: 11, color: C.half, textAlign: "center" }}>{h}</th>)}</tr></thead>
            <tbody>
              {round.map((m, mi) => (
                <tr key={mi} style={{ borderBottom: `1px solid ${C.border}` }}>
                  <td style={{ padding: "9px 10px", textAlign: "center" }}>
                    <input value={m.rink} onChange={e => updateRink(ri, mi, e.target.value)} style={{ width: 42, textAlign: "center", border: `1px solid ${C.border}`, borderRadius: 4, padding: "3px 5px", fontSize: 12, fontFamily: "inherit" }} />
                  </td>
                  <td style={{ padding: "9px 10px", fontWeight: 600, color: C.slate, textAlign: "left" }}>{m.home}</td>
                  <td /><td style={{ padding: "9px 10px", textAlign: "center", color: C.half, fontSize: 11 }}>v</td><td />
                  <td style={{ padding: "9px 10px", fontWeight: 600, color: C.slate, textAlign: "left" }}>{m.away}</td>
                  <td style={{ padding: "9px 10px", textAlign: "center" }}>
                    {m.homeScore !== "" && m.awayScore !== "" ? <span style={{ fontWeight: 700, color: C.green }}>{m.homeScore}–{m.awayScore}</span> : <span style={{ color: C.half, fontSize: 11 }}>pending</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  RESULTS (tournament round-robin)
// ══════════════════════════════════════════════════════════════════════════
function Results({ tournament, setTournament }) {
  const [activeRound, setActiveRound] = useState(0);
  if (!tournament) return <EmptyState msg="No tournament set up." sub="Go to Tournament Setup first." />;
  const updateScore = (ri, mi, field, val) => {
    const rounds = tournament.rounds.map((r, rIdx) => rIdx !== ri ? r : r.map((m, mIdx) => mIdx !== mi ? m : { ...m, [field]: val }));
    setTournament({ ...tournament, rounds });
  };
  const round = tournament.rounds[activeRound] || [];
  return (
    <div style={{ padding: 28, maxWidth: 820, margin: "0 auto" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
        <h2 style={{ color: C.greenDk, margin: 0, fontSize: 20, fontWeight: 800 }}>Enter Results</h2>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
          {tournament.rounds.map((_, ri) => (
            <button key={ri} onClick={() => setActiveRound(ri)} style={{ border: "none", borderRadius: 6, padding: "6px 13px", cursor: "pointer", background: ri === activeRound ? C.green : C.greenLt, color: ri === activeRound ? "#fff" : C.green, fontWeight: 700, fontSize: 12, fontFamily: "inherit" }}>R{ri + 1}</button>
          ))}
        </div>
      </div>
      <Card>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
          <span style={{ background: C.green, color: "#fff", borderRadius: 6, padding: "4px 12px", fontSize: 12, fontWeight: 700 }}>ROUND {activeRound + 1}</span>
          <span style={{ color: C.half, fontSize: 12 }}>{round.filter(m => m.homeScore !== "" && m.awayScore !== "").length}/{round.length} complete</span>
        </div>
        <div style={{ display: "grid", gap: 9 }}>
          {round.map((m, mi) => {
            const done = m.homeScore !== "" && m.awayScore !== "";
            return (
              <div key={mi} style={{ display: "grid", gridTemplateColumns: "40px 1fr 58px 28px 58px 1fr", gap: 7, alignItems: "center", padding: "11px 14px", borderRadius: 8, background: done ? C.greenLt : C.off, border: `1px solid ${done ? C.green + "40" : C.border}` }}>
                <span style={{ fontSize: 11, color: C.half, fontWeight: 600, textAlign: "center" }}>R{m.rink}</span>
                <span style={{ fontWeight: 600, color: C.slate, fontSize: 13 }}>{m.home}</span>
                <input type="number" min="0" max="99" value={m.homeScore} onChange={e => updateScore(activeRound, mi, "homeScore", e.target.value)} placeholder="–"
                  style={{ textAlign: "center", border: `2px solid ${C.green}`, borderRadius: 6, padding: "6px", fontSize: 18, fontWeight: 700, fontFamily: "inherit", color: C.greenDk, outline: "none", width: "100%" }} />
                <span style={{ textAlign: "center", color: C.half, fontWeight: 700, fontSize: 12 }}>v</span>
                <input type="number" min="0" max="99" value={m.awayScore} onChange={e => updateScore(activeRound, mi, "awayScore", e.target.value)} placeholder="–"
                  style={{ textAlign: "center", border: `2px solid ${C.green}`, borderRadius: 6, padding: "6px", fontSize: 18, fontWeight: 700, fontFamily: "inherit", color: C.greenDk, outline: "none", width: "100%" }} />
                <span style={{ fontWeight: 600, color: C.slate, fontSize: 13, textAlign: "right" }}>{m.away}</span>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  LADDER (tournament round-robin)
// ══════════════════════════════════════════════════════════════════════════
function Ladder({ tournament }) {
  if (!tournament) return <EmptyState msg="No tournament set up." />;
  const ladder = calcLadder(tournament.teams, tournament.rounds, tournament.rankMethod);
  return (
    <div style={{ padding: 28, maxWidth: 860, margin: "0 auto" }}>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ color: C.greenDk, margin: "0 0 4px", fontSize: 20, fontWeight: 800 }}>Live Ladder</h2>
        <p style={{ margin: 0, fontSize: 13, color: C.half }}>{tournament.name} · {tournament.rankMethod}</p>
      </div>
      <Card style={{ padding: 0, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead><tr style={{ background: C.greenDk }}>{["Pos","Team","P","W","L","D","For","Against","Margin"].map(h => <th key={h} style={{ padding: "11px 13px", color: "#fff", fontSize: 11, fontWeight: 700, textAlign: h === "Team" ? "left" : "center", whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
          <tbody>
            {ladder.map((row, i) => (
              <tr key={row.team} style={{ borderBottom: `1px solid ${C.border}`, background: i % 2 === 0 ? C.white : C.off }}>
                <td style={{ padding: "11px 13px", textAlign: "center" }}>{i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : <span style={{ color: C.half, fontSize: 12, fontWeight: 600 }}>{i + 1}</span>}</td>
                <td style={{ padding: "11px 13px", fontWeight: 600, color: C.slate }}>{row.team}</td>
                <td style={{ padding: "11px 13px", textAlign: "center", color: C.half }}>{row.played}</td>
                <td style={{ padding: "11px 13px", textAlign: "center", fontWeight: 700, color: C.green }}>{row.wins}</td>
                <td style={{ padding: "11px 13px", textAlign: "center", color: C.red }}>{row.losses}</td>
                <td style={{ padding: "11px 13px", textAlign: "center", color: C.half }}>{row.draws}</td>
                <td style={{ padding: "11px 13px", textAlign: "center" }}>{row.shotsFor}</td>
                <td style={{ padding: "11px 13px", textAlign: "center" }}>{row.shotsAgainst}</td>
                <td style={{ padding: "11px 13px", textAlign: "center", fontWeight: 700, color: row.margin >= 0 ? C.green : C.red }}>{row.margin > 0 ? "+" : ""}{row.margin}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
//  SMART TV
// ══════════════════════════════════════════════════════════════════════════
function SmartTV({ tournament, vers, champ, pennant, branding }) {
  const [tab, setTab] = useState("scores");
  const hasT = !!tournament, hasV = !!vers, hasC = !!champ;
  const hasP = !!(pennant?.sections?.length);

  useEffect(() => {
    const available = [hasT && "scores", hasV && "vers", hasT && "ladder", hasP && "pennant", hasC && "bracket"].filter(Boolean);
    if (available.length && !available.includes(tab)) setTab(available[0]);
    const id = setInterval(() => setTab(t => {
      const idx = available.indexOf(t);
      return available[(idx + 1) % available.length] || available[0];
    }), 20000);
    return () => clearInterval(id);
  }, [hasT, hasV, hasC, hasP]);

  const tLadder = hasT ? calcLadder(tournament.teams, tournament.rounds, tournament.rankMethod) : [];
  const vLadder = hasV ? calcVersatilityLadder([...new Set(vers.rounds.flat().map(m => m.home).concat(vers.rounds.flat().map(m => m.away)))], vers.rounds, vers.rankMethod) : [];
  const champion = hasC ? champ.rounds[champ.rounds.length - 1]?.[0]?.winner : null;

  const tvSec = hasP ? pennant.sections[0] : null;
  const tvSecLadder = tvSec ? calcPennantLadder(tvSec.clubs, tvSec.rounds) : [];
  const tvLatestRound = tvSec ? tvSec.rounds.reduce((best, r, i) => r.some(f => f.rinks.some(rk => rk.homeScore !== "" || rk.awayScore !== "")) ? i : best, 0) : 0;

  const tabs = [
    hasT && { id: "scores", label: "🎯 Tournament" },
    hasV && { id: "vers", label: "🔀 Versatility" },
    hasT && { id: "ladder", label: "🏆 Ladder" },
    hasP && { id: "pennant", label: "🏠 Pennant" },
    hasC && { id: "bracket", label: "🏅 Championship" },
  ].filter(Boolean);

  const accent = branding?.accentColor || C.gold;
  const clubName = branding?.clubName || (hasT ? tournament.name : hasC ? champ?.name : "BowlsDirector");
  const logo = branding?.logoDataUrl;
  const sponsorLogo = branding?.sponsorLogoDataUrl;
  const sponsorName = branding?.sponsorName;

  const TV = (
    <div style={{ background: "#0a2218", minHeight: "100%", color: "#fff", fontFamily: "inherit" }}>
      {/* ── TV HEADER ── */}
      <div style={{ background: "#0d2f1a", padding: "12px 28px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `3px solid ${accent}` }}>
        {/* Left: club identity */}
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          {logo
            ? <img src={logo} alt="Club" style={{ height: 52, width: 52, objectFit: "contain", borderRadius: 6, background: "rgba(255,255,255,.07)", padding: 3 }} />
            : <LawnBowl size={34} />
          }
          <div>
            <div style={{ fontSize: 20, fontWeight: 800, color: "#fff", lineHeight: 1.2 }}>{clubName}</div>
            {branding?.tagline && <div style={{ fontSize: 12, color: accent, fontWeight: 500, marginTop: 2 }}>{branding.tagline}</div>}
            {champion && <div style={{ fontSize: 12, color: accent, fontWeight: 700, marginTop: 2 }}>🏆 Champion: {champion}</div>}
          </div>
        </div>
        {/* Right: sponsor + live badge + time */}
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          {sponsorLogo && (
            <div style={{ textAlign: "center" }}>
              {sponsorName && <div style={{ fontSize: 8, color: "rgba(255,255,255,.4)", letterSpacing: 1, marginBottom: 4, textTransform: "uppercase" }}>Principal Sponsor</div>}
              <img src={sponsorLogo} alt="Sponsor" style={{ height: 38, maxWidth: 110, objectFit: "contain", background: "rgba(255,255,255,.9)", borderRadius: 4, padding: "4px 8px" }} />
            </div>
          )}
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ background: C.live, borderRadius: 6, padding: "4px 12px", fontWeight: 800, fontSize: 13, display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ width: 7, height: 7, background: "#fff", borderRadius: "50%", display: "inline-block" }} />LIVE
            </div>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,.4)" }}>{new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
          </div>
        </div>
      </div>

      {/* ── SPONSOR TICKER (if sponsor set but no logo, show name bar) ── */}
      {sponsorName && !sponsorLogo && (
        <div style={{ background: accent, padding: "5px 28px", fontSize: 12, fontWeight: 700, color: C.greenDk, display: "flex", alignItems: "center", gap: 8 }}>
          <span>⭐ Principal Sponsor:</span><span>{sponsorName}</span>
        </div>
      )}

      <div style={{ display: "flex", borderBottom: "1px solid rgba(255,255,255,.08)" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab === t.id ? accent : "transparent", color: tab === t.id ? C.greenDk : "rgba(255,255,255,.55)", border: "none", padding: "10px 24px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>{t.label}</button>
        ))}
      </div>

      {/* Tournament scores */}
      {tab === "scores" && hasT && (
        <div style={{ padding: 24 }}>
          {tournament.rounds.map((round, ri) => {
            const any = round.some(m => m.homeScore !== "" || m.awayScore !== "");
            if (!any && ri > 0) return null;
            return (
              <div key={ri} style={{ marginBottom: 22 }}>
                <div style={{ fontSize: 10, fontWeight: 800, color: C.gold, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Round {ri + 1}</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 9 }}>
                  {round.map((m, mi) => {
                    const done = m.homeScore !== "" && m.awayScore !== "";
                    const hs = parseInt(m.homeScore), as = parseInt(m.awayScore);
                    return (
                      <div key={mi} style={{ background: "rgba(255,255,255,.06)", borderRadius: 8, padding: "11px 14px", border: `1px solid ${done ? C.gold + "35" : "rgba(255,255,255,.06)"}`, display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 7 }}>

// Build a full home-and-away season fixture list for one section
// clubs = ["Club A","Club B",...], numRounds = how many rounds to generate
function buildPennantFixtures(clubs, numRounds, rinksPerMatch, format) {
  const list = [...clubs];
  if (list.length % 2 !== 0) list.push("BYE");
  const total = list.length, half = total / 2, rrLen = total - 1;
  const allRounds = [];

  // Build full home-and-away (2× round-robin)
  for (let pass = 0; pass < 2; pass++) {
    const rot = [...list];
    for (let r = 0; r < rrLen; r++) {
      const fixtures = [];
      for (let i = 0; i < half; i++) {
        const a = rot[i], b = rot[total - 1 - i];
        if (a === "BYE" || b === "BYE") continue;
        const home = pass === 0 ? a : b;
        const away = pass === 0 ? b : a;
        const rinks = Array.from({ length: rinksPerMatch }, (_, ri) => ({
          rink: ri + 1,
          homeScore: "",
          awayScore: "",
        }));
        fixtures.push({ id: `p${pass}-r${r}-${home}-${away}`, home, away, rinks, venue: home + " BC" });
      }
      allRounds.push(fixtures);
      rot.splice(1, 0, rot.pop());
    }
  }
  return allRounds.slice(0, numRounds);
}

// Calculate pennant season ladder
// Points: 2 pts per match win, 1 per draw; bonus: rink wins count
function calcPennantLadder(clubs, rounds) {
  const stats = {};
  clubs.forEach(c => {
    stats[c] = { club: c, played: 0, wins: 0, losses: 0, draws: 0, points: 0, rinkWins: 0, rinkLosses: 0, rinkDraws: 0, shotsFor: 0, shotsAgainst: 0, margin: 0 };
  });

  rounds.forEach(round => round.forEach(fixture => {
    const { home, away, rinks } = fixture;
    if (!stats[home] || !stats[away]) return;
    const scoredRinks = rinks.filter(r => r.homeScore !== "" && r.awayScore !== "");
    if (scoredRinks.length === 0) return;

    const totalHome = scoredRinks.reduce((s, r) => s + parseInt(r.homeScore || 0), 0);
    const totalAway = scoredRinks.reduce((s, r) => s + parseInt(r.awayScore || 0), 0);
    let hRinkW = 0, aRinkW = 0;
    scoredRinks.forEach(r => {
      const hs = parseInt(r.homeScore || 0), as = parseInt(r.awayScore || 0);
      if (hs > as) hRinkW++;
      else if (as > hs) aRinkW++;
    });

    stats[home].played++; stats[away].played++;
    stats[home].shotsFor += totalHome; stats[home].shotsAgainst += totalAway;
    stats[away].shotsFor += totalAway; stats[away].shotsAgainst += totalHome;
    stats[home].margin += (totalHome - totalAway);
    stats[away].margin += (totalAway - totalHome);
    stats[home].rinkWins += hRinkW; stats[away].rinkWins += aRinkW;
    stats[home].rinkLosses += aRinkW; stats[away].rinkLosses += hRinkW;

    // Match result by total shots
    if (scoredRinks.length === rinks.length) { // only count when all rinks complete
      if (totalHome > totalAway) {
        stats[home].wins++; stats[away].losses++;
        stats[home].points += 2;
      } else if (totalAway > totalHome) {
        stats[away].wins++; stats[home].losses++;
        stats[away].points += 2;
      } else {
        stats[home].draws++; stats[away].draws++;
        stats[home].points++; stats[away].points++;
      }
    }
  }));

  return Object.values(stats).sort((a, b) => {
    const pd = b.points - a.points; if (pd) return pd;
    const rwd = b.rinkWins - a.rinkWins; if (rwd) return rwd;
    return b.margin - a.margin;
  });
}

function exportPennantCSV(section) {
  let csv = "Round,Home Club,Away Club,Rink,Home Score,Away Score\n";
  section.rounds.forEach((round, ri) => {
    round.forEach(fix => {
      fix.rinks.forEach(r => {
        csv += `${ri + 1},"${fix.home}","${fix.away}",${r.rink},${r.homeScore || ""},${r.awayScore || ""}\n`;
      });
    });
  });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
  a.download = `${section.name.replace(/\s+/g, "_")}_Pennant_BowlsLink.csv`;
  a.click();
}
